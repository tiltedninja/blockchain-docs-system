<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Blockchain</div>
    <div class="nav-links">
      <button class="nav-btn" id="uploadBtn">Upload Document</button>
      <button class="nav-btn" id="historyBtn">View History</button>
      <div class="user-menu">
        <button class="avatar-btn" id="userBtn">CSC4</button>
        <div class="dropdown" aria-hidden="true">
          <button onclick="logout()">Logout</button>
          <button>Settings & Privacy</button>
          <button>Feedback</button>
          <button>Display & Accessibility</button>
          <button>Help & Support</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <section class="dashboard">
      <h1>Securely register documents on an immutable ledger</h1>
      <p>Upload or capture documents, verify integrity, and analyze performance — all in one minimal dashboard.</p>
      <div class="actions">
        <button class="action-btn" id="uploadDigital">Upload Digital</button>
        <button class="action-btn" id="capturePhysical">Capture Physical</button>
      </div>

      <section class="transaction-detail">
        <h2>Transaction Detail</h2>
        <p id="txStatus">Status: Pending</p>
        <p id="txSignature">Digital Signature: <span>Not signed</span></p>
        <button id="generateSig">Generate Digital Signature</button>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
